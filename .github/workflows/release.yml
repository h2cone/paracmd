name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BINARY_NAME: paracmd
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked

  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: verify
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate tag matches Cargo.toml
        id: version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(python - <<'PY'
          from pathlib import Path
          import tomllib

          data = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          print(data["package"]["version"])
          PY
          )"

          if [[ "$tag_version" != "$cargo_version" ]]; then
            echo "Tag version v${tag_version} does not match Cargo.toml version ${cargo_version}." >&2
            exit 1
          fi

          echo "version=${tag_version}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        run: |
          python .github/scripts/extract_release_notes.py \
            CHANGELOG.md \
            "${{ steps.version.outputs.version }}" \
            release-notes.md

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_format: tar.gz
            binary_extension: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive_format: tar.gz
            binary_extension: ""
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive_format: zip
            binary_extension: .exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package release archive
        shell: bash
        run: |
          python .github/scripts/package_release.py \
            --binary "target/${{ matrix.target }}/release/${BINARY_NAME}${{ matrix.binary_extension }}" \
            --version "${{ needs.prepare.outputs.version }}" \
            --target "${{ matrix.target }}" \
            --format "${{ matrix.archive_format }}" \
            --output-dir dist

      - name: Upload packaged asset
        uses: actions/upload-artifact@v6
        with:
          name: release-asset-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - prepare
      - build
    permissions:
      contents: write

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v5
        with:
          pattern: release-asset-*
          path: dist
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v5
        with:
          name: release-notes
          path: dist

      - name: Generate SHA256 checksums
        working-directory: dist
        run: sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" > /dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz dist/*.zip dist/SHA256SUMS.txt --clobber
            gh release edit "${GITHUB_REF_NAME}" \
              --title "paracmd v${{ needs.prepare.outputs.version }}" \
              --notes-file dist/release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/*.tar.gz \
              dist/*.zip \
              dist/SHA256SUMS.txt \
              --verify-tag \
              --title "paracmd v${{ needs.prepare.outputs.version }}" \
              --notes-file dist/release-notes.md
          fi
